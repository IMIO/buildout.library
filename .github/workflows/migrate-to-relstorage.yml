name: Publish and deploy migrate-to-relstorage image
on:
  push:
    branches:
      - migrate-to-relstorage
    tags:
      - '!**'
  workflow_dispatch:
env:
  IMAGE_NAME: 'web/library/mutual'
  REGISTRY_URL: ${{ secrets.HARBOR_URL }}

permissions:
  contents: read
  security-events: write

jobs:
  build-push:
    runs-on: gha-runners-smartweb
    if: contains(github.event.head_commit.message, 'Back to development:') == false && contains(github.event.head_commit.message, 'Preparing release') == false
    steps:
      - name: Build tags
        run: |
          {
            echo 'IMAGE_TAGS<<EOF'
            echo '${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:migrate-to-relstorage'
            echo '${{ env.REGISTRY_URL }}/${{ env.IMAGE_NAME }}:migrate-to-relstorage-${{ github.run_number }}'
            echo EOF
          } >> $GITHUB_ENV
      - name: Build push and notify
        uses: IMIO/gha/build-push-notify@v7
        with:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAGS: ${{ env.IMAGE_TAGS }}
          REGISTRY_URL: ${{ env.REGISTRY_URL}}
          REGISTRY_USERNAME: ${{ secrets.SMARTWEB_HARBOR_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.SMARTWEB_HARBOR_PASSWORD }}
          MATTERMOST_WEBHOOK_URL: ${{ secrets.SMARTWEB_MATTERMOST_WEBHOOK_URL }}
  trivy-image:
    name: Image scan
    runs-on: gha-runners-smartweb
    needs: build-push
    steps:
      - uses: IMIO/gha/trivy-scan-notify@v7
        with:
          SCAN_TYPE: image
          IMAGE_REF: ${{ secrets.HARBOR_URL }}/web/smartweb/mutual:migrate-to-relstorage
          EXIT_CODE: '0'
          TRIVYIGNORES: ''
          TRIVY_USERNAME: ${{ secrets.SMARTWEB_HARBOR_USERNAME }}
          TRIVY_PASSWORD: ${{ secrets.SMARTWEB_HARBOR_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MATTERMOST_WEBHOOK_URL: ${{ secrets.SMARTWEB_MATTERMOST_WEBHOOK_URL }}
          UPLOAD_SARIF: 'true'
          IGNORE_UNFIXED: 'false'
  trivy-fs:
    name: Filesystem scan
    runs-on: gha-runners-smartweb
    steps:
      - uses: IMIO/gha/trivy-scan-notify@v7
        with:
          SCAN_TYPE: fs
          SCAN_REF: .
          EXIT_CODE: '0'
          TRIVYIGNORES: ''
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MATTERMOST_WEBHOOK_URL: ${{ secrets.SMARTWEB_MATTERMOST_WEBHOOK_URL }}
          UPLOAD_SARIF: 'true'
          IGNORE_UNFIXED: 'false'
  deploy:
    runs-on: gha-runners-smartweb
    needs: [trivy-image, trivy-fs]
    environment: staging
    steps:
      - name: Deploy to staging and notify
        uses: IMIO/gha/rundeck-notify@v7
        with:
          RUNDECK_URL: ${{ secrets.RUNDECK_URL }}
          RUNDECK_TOKEN: ${{ secrets.SMARTWEB_RUNDECK_TOKEN }}
          RUNDECK_JOB_ID: ${{ vars.RUNDECK_JOB_ID }}
          RUNDECK_PARAMETERS: '-F "filter=name ${{ vars.NODE_NAME }}" -F "option.tag=${{ vars.IMAGE_TAG_STAGING }}" -F "option.image_name=${{ vars.IMAGE_NAME }}"'
          MATTERMOST_WEBHOOK_URL: ${{ secrets.SMARTWEB_MATTERMOST_WEBHOOK_URL }}
